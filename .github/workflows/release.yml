name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch "$TAG_NAME" "$SERVER_URL/$REPO.git" .
        env:
          TAG_NAME: ${{ github.ref_name }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}

      - name: Set up JDK 8
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-8-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64" >> "$GITHUB_ENV"
          echo "/usr/lib/jvm/java-8-openjdk-amd64/bin" >> "$GITHUB_PATH"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Extract version from tag
        id: version
        run: echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG_NAME: ${{ github.ref_name }}

      - name: Verify gradle version matches tag
        run: |
          gradle_version=$(grep -oP 'version\s*=\s*"\K[^"]+' client/build.gradle.kts)
          if [ "$gradle_version" != "$EXPECTED_VERSION" ]; then
            echo "Version mismatch: tag=$EXPECTED_VERSION, gradle=$gradle_version" >&2
            exit 1
          fi
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}

      - name: Build + obfuscate jar
        run: ./gradlew :client:proguardJar --no-daemon --stacktrace

      - name: Stage release artifact + checksum
        id: artifact
        run: |
          src="client/build/libs/void-client-$VERSION-release.jar"
          dst_dir="release"
          dst="$dst_dir/void-client-$VERSION.jar"
          mkdir -p "$dst_dir"
          cp "$src" "$dst"
          (cd "$dst_dir" && sha256sum "void-client-$VERSION.jar" > "void-client-$VERSION.jar.sha256")
          echo "jar=$dst" >> "$GITHUB_OUTPUT"
          echo "sha=${dst}.sha256" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Publish release
        run: |
          gh release create "$TAG_NAME" \
            --repo "$REPO" \
            --title "$TAG_NAME" \
            --generate-notes \
            "$JAR" \
            "$SHA"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          JAR: ${{ steps.artifact.outputs.jar }}
          SHA: ${{ steps.artifact.outputs.sha }}
